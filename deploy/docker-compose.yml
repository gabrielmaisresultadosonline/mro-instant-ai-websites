services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: ./app.env
    # IMPORTANT: bind only to localhost — the host nginx will reverse-proxy.
    # This prevents conflicts with other sites on the same VPS.
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ../public/uploads:/app/public/uploads
