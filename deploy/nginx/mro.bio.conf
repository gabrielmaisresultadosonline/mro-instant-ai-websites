# /etc/nginx/sites-available/mro.bio
# Bloco de nginx para servir mro.bio, www.mro.bio e *.mro.bio
# repassando para o container Docker do app (porta 127.0.0.1:3001).
#
# IMPORTANTE: este arquivo NÃO interfere com outros sites do VPS.
# Os domínios `belezalisoperfeito.online` e quaisquer outros continuam
# servidos pelos seus próprios server blocks do nginx do host.

# ---------- HTTP: redireciona tudo para HTTPS (somente mro.bio) ----------
server {
    listen 80;
    listen [::]:80;
    server_name mro.bio www.mro.bio *.mro.bio;

    # Permite o desafio do certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS apex + www ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mro.bio www.mro.bio;

    ssl_certificate     /etc/letsencrypt/live/mro.bio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mro.bio/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    # Uploads servidos direto do filesystem (rápido)
    location /uploads/ {
        alias /var/www/mro.bio/public/uploads/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Geração/edição de sites via IA pode demorar bastante (modelo grande).
        # Aumentamos os timeouts para 10 minutos para evitar 504.
        proxy_connect_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        send_timeout 600s;
        proxy_buffering off;
        client_max_body_size 25m;
    }
}

# ---------- HTTPS subdomínios *.mro.bio ----------
# Usa o MESMO certificado wildcard (*.mro.bio) emitido via DNS-01.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.mro.bio;

    ssl_certificate     /etc/letsencrypt/live/mro.bio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mro.bio/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        # Repassa tudo para o app — o próprio app já reescreve internamente
        # `slug.mro.bio` para `/api/public/site/<slug>` (ver src/server.ts).
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Mesmo timeout do domínio principal. Sem isso, subdomínios caem no
        # padrão do Nginx e podem gerar 504 em chamadas longas.
        proxy_connect_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        send_timeout 600s;
        proxy_buffering off;
        client_max_body_size 25m;
    }
}
